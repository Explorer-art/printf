<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Регистрация</title>
        <link rel="stylesheet" href="/static/styles/reg_style.css">
        <link rel="stylesheet" href="/static/styles/header_style.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </head>
    <body>
        <main>
        <div class="wrapper">
            <form action="register.php" method="post">
                <h1>Регистрация</h1>
                <div class="input-box">
                    <input type="text" placeholder="Имя пользователя" name="username" required>
                    <i class='bx bxs-user'></i>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Электронная почта" name="email" required>
                    <i class='bx bxs-envelope'></i>
                </div>

                <div class="input-box">
                    <input class="password" type="password" placeholder="Пароль" name="password" required>
                    <i class='bx bxs-lock-alt toggle-password' ></i>
                </div>

                <div class="input-box">
                    <input class="password" type="password" placeholder="Подтвердите пароль" name="repeatpass" required>
                    <i class='bx bxs-lock-alt toggle-password' ></i>
                </div>

                <button type="submit" class="btn">Регистрация</button>

                <div class="register-link">
                    <p>Уже есть аккаунт? <a href="login.html">Вход</a></p>
                </div>
            </form>
        </div>
    </main>
        <script>
            // Получаем все элементы с классом .password и .toggle-password
            const passwordInputs = document.querySelectorAll('.password');
            const toggleIcons = document.querySelectorAll('.toggle-password');

            toggleIcons.forEach((icon, index) => {
                icon.addEventListener('click', () => {
                    const isPassword = passwordInputs[index].getAttribute('type') === 'password';
                    passwordInputs[index].setAttribute('type', isPassword ? 'text' : 'password');

                    // Переключение иконки
                    if (isPassword) {
                        icon.classList.remove('bxs-lock-alt');
                        icon.classList.add('bxs-lock-open-alt');
                    } else {
                        icon.classList.remove('bxs-lock-open-alt');
                        icon.classList.add('bxs-lock-alt');
                    }
                });
            });
        </script>
    </body>
</html>
